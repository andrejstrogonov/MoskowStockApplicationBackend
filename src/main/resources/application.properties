spring.application.name=MoskowStockApplicationBackend

# Database configuration
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Custom RabbitMQ settings
rabbitmq.exchange.market-data=market.data.exchange
rabbitmq.exchange.portfolio=portfolio.exchange
rabbitmq.queue.market-data-updates=market.data.updates
rabbitmq.queue.portfolio-generation=portfolio.generation
rabbitmq.queue.dead-letter=dead.letter.queue
rabbitmq.routing-key.market-data=stock.update.*
