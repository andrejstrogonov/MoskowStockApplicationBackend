spring.application.name=MoskowStockApplicationBackend


# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Custom RabbitMQ settings
rabbitmq.exchange.market-data=market.data.exchange
rabbitmq.exchange.portfolio=portfolio.exchange
rabbitmq.queue.market-data-updates=market.data.updates
rabbitmq.queue.portfolio-generation=portfolio.generation
rabbitmq.queue.dead-letter=dead.letter.queue
rabbitmq.routing-key.market-data=stock.update.*

# SpringDoc OpenAPI configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

---
# PostgreSQL profile
spring.config.activate.on-profile=prod

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/stockdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=password

# JPA configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

---
# Logging configuration for dev
logging.level.root=INFO
logging.level.org.andrejstrogonov.moskowstockapplicationbackend=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.amqp=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log file configuration
logging.file.name=logs/application.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
