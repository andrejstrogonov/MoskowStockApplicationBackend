spring.application.name=MoskowStockApplicationBackend


# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# RabbitMQ configuration
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.virtual-host=/

# Custom RabbitMQ settings
rabbitmq.exchange.market-data=market.data.exchange
rabbitmq.exchange.portfolio=portfolio.exchange
rabbitmq.queue.market-data-updates=market.data.updates
rabbitmq.queue.portfolio-generation=portfolio.generation
rabbitmq.queue.dead-letter=dead.letter.queue
rabbitmq.routing-key.market-data=stock.update.*

---
# PostgreSQL profile
spring.config.activate.on-profile=prod

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://localhost:5432/stockdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=password

# JPA configuration for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
